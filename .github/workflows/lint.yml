name: Runs strict swift lint for the whole repository.

on:
  workflow_call:
    inputs:
      runs_on:
          description: "The runner image to use. Must be an image with swift pre-installed like 'macos-latest'."
          default: "macos-latest"
          required: false
          type: string

permissions: {}

jobs:
  lint:
    runs-on: ${{ inputs.runs_on }}
    steps:
      - name: List environment variables
        shell: bash
        run: set
      - uses: actions/checkout@v6
      - name: Strict lint
        shell: bash
        run: swift format lint . --recursive --parallel --strict
